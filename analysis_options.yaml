# Analyzer configuration for the DocSera patient app.
#
# Strategy:
#   - Use Flutter's recommended lint baseline (flutter_lints).
#   - PROMOTE regression-risky lints to errors so they break the build
#     instead of silently accumulating (the post-2026-05-16 ratchet).
#   - Demote architectural / intentional-pattern lints to ignore.
#
# History:
#   - 2026-05-16: drove analyzer 333 -> 0 across Phases 1-3 of the lint
#     cleanup (see docs/launch/19-lint-cleanup-to-zero.md).
#     Promoted the rules below from info -> error to lock in the work.
#
# Decisions documented inline. If a promoted rule fires on legitimate
# code, prefer an inline `// ignore: <rule>` with a one-line justification
# over flipping the rule back to info. Never use `// ignore_for_file:`.

include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    # ============================================================
    # PROMOTED TO ERROR — regression-prevention ratchet (2026-05-16)
    # ============================================================

    # The dangerous one. Wrong fix breaks navigation, swallows side
    # effects, or crashes. Use Pattern A-F from the cleanup playbook
    # (cache navigator/messenger/cubit BEFORE the await, then
    # mounted/context.mounted check after).
    use_build_context_synchronously: error

    # Unused-code rules — accumulate fast in a multi-agent codebase.
    # Promoting prevents drift.
    unused_import: error
    unused_local_variable: error
    unused_field: error
    unused_element: error

    # Enforce CLAUDE.md "never log PII or auth material" — production
    # prints get gated on kDebugMode or rewritten to log length/boolean
    # outcomes only. Use debugPrint for development-time logs.
    avoid_print: error

    # Flutter API churn surfaces here. Keep current to avoid landing
    # on a deprecated API the day before launch.
    deprecated_member_use: error

    # ============================================================
    # IGNORED — architectural / intentional patterns
    # ============================================================

    # Cubit/State classes intentionally keep their state types in the
    # same file as the public Cubit, which exposes private types via
    # the public API. Project convention.
    library_private_types_in_public_api: ignore

    # `depend_on_referenced_packages` — kept as info so the resolver
    # surface change is visible but doesn't block CI; the lint cleanup
    # added explicit entries for bloc + flutter_cache_manager.
    depend_on_referenced_packages: info

    # Defensive `?? fallback` patterns are intentional in this app —
    # we keep them as future-proofing for nullability changes.
    dead_null_aware_expression: ignore

    # Bidi marks in Arabic UI strings (LRM/RLM) are sometimes intentional.
    text_direction_code_point_in_literal: ignore
    text_direction_code_point_in_comment: ignore
