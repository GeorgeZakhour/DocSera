// Root-level build.gradle

buildscript {
    repositories {
        mavenLocal()
        google()  // Make sure this is included
        mavenCentral()
    }
    // Kotlin 2.0.21 is the first stable version compatible with AGP 8.7+
    // (AGP 8.x removed the BaseVariant API that Kotlin 1.9.x still referenced,
    // causing 'Could not generate a decorated class for type KotlinAndroidTarget'
    // failures on CI). Bumped from 1.9.23 on 2026-05-05.
    ext.kotlin_version = '2.0.21'

    dependencies {
        classpath 'com.android.tools.build:gradle:8.8.0'
        // Add the Google services plugin for Firebase
        classpath 'com.google.gms:google-services:4.4.2'  // This is important!
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }


}

allprojects {
    repositories {
        mavenLocal()
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
