pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    // AGP, Kotlin, and google-services must be declared here so the
    // subproject `plugins {}` block in app/build.gradle resolves them at
    // the correct version. Declaring only via root buildscript.classpath is
    // the legacy pattern and doesn't reach subproject plugin DSL on recent
    // Gradle, so subprojects silently pull a stale Kotlin plugin and fail
    // with the BaseVariant decoration error on a clean CI checkout.
    // Versions match what `flutter create` generates for Flutter 3.32.7.
    // AGP 8.9.1 (above Flutter 3.32.7's scaffold default of 8.7.3) is required
    // by transitive `androidx.core:core-ktx:1.18.0`, which one of our deps pulls
    // in. The 8.9.1 hosts Kotlin 2.1.0 cleanly (BaseVariant already gone in
    // KGP 2.1, so that earlier failure mode does not return).
    id "com.android.application" version "8.9.1" apply false
    id "org.jetbrains.kotlin.android" version "2.1.0" apply false
    id "com.google.gms.google-services" version "4.4.2" apply false
}

include ":app"
