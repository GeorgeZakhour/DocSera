# =============================================================================
# DocSera Patient App — Continuous Integration (Cheap Path)
# =============================================================================
# Runs on every push to main and every PR. Validates code never reaches a
# broken state: static analysis + unit/widget test suite. Deliberately does
# NOT build Android or iOS — those are gated behind the manual `Build` workflow
# (.github/workflows/build.yml) so the free-tier minute budget isn't burned
# on every commit.
#
# Cost per push: ~8 minute-units (Linux 1× multiplier).
# Free tier (2,000 min/mo) → ~250 pushes/month before exhaustion.
#
# Why not build here:
#   - Native Android/iOS builds rarely break in ways the Dart analyzer + tests
#     don't already catch. When they do, the manual `Build` workflow surfaces
#     it before merge or release.
#   - macOS minutes have a 10× multiplier — the iOS job alone burns ~50
#     minute-units per push, eating 75% of the free-tier budget.
#   - We can run the manual workflow on demand from the Actions UI when we
#     specifically want a fresh APK or to verify iOS toolchain changes.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-progress run for the same branch when a new commit lands.
# Prevents wasted minutes when the developer pushes a quick fix-up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.32.7'
  FLUTTER_CHANNEL: 'stable'

jobs:
  # ---------------------------------------------------------------------------
  # 1. Static analysis — runs flutter analyze on the entire lib/ tree.
  #    Fast, cheap, catches type errors, unused code, and most regressions.
  # ---------------------------------------------------------------------------
  analyze:
    name: Static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      # CI fails only on actual errors (code that would break compilation
      # or produce undefined behavior). Warnings and infos are surfaced in
      # the log but don't fail the build — analysis_options.yaml already
      # demotes architectural-only lints (Step 9).
      - name: Analyze (lib only — production code)
        run: flutter analyze --no-fatal-infos --no-fatal-warnings lib/

  # ---------------------------------------------------------------------------
  # 2. Tests — runs the full unit + widget + integration suite (367 tests).
  # ---------------------------------------------------------------------------
  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Run tests with coverage
        run: flutter test --coverage --reporter=compact

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          retention-days: 3
          if-no-files-found: warn
